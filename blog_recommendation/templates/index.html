<!DOCTYPE html>
<html>
<head>
<title>Blog Recommendation System</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:500px;
text-align:center;
}

select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:20px;
padding:10px;
width:100%;
background:#667eea;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Blog Recommendation System</h2>

<form method="POST">

<select name="title">

{% for title in titles %}

<option value="{{title}}">{{title}}</option>

{% endfor %}

</select>

<button type="submit">Recommend Blogs</button>

</form>

{% if recommendations %}

<h3>Recommended Blogs</h3>

<ul>

{% for blog in recommendations %}

<h4>{{blog.Title}}</h4>
<p>{{blog.Content}}</p>

{% endfor %}

</ul>

{% endif %}

</div>

</body>
</html>
